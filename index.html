<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VG TV</title>
    <link rel="icon" href="https://raw.githubusercontent.com/VGLiveTV/vgtv/refs/heads/main/fav.png">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #e50914; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* Navbar */
        .nav { padding: 15px; background: #111; border-bottom: 2px solid var(--accent); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .nav-logo { height: 35px; margin-right: 10px; object-fit: contain; }
        
        /* Inputs */
        input[type="text"] { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #000; color: #fff; outline: none; font-size: 13px; flex: 1; min-width: 150px; }
        input[type="text"]:focus { border-color: var(--accent); }

        .btn { padding: 8px 12px; background: var(--accent); color: #fff; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; font-size: 13px; white-space: nowrap; text-decoration: none; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        
        /* Grid */
        .grid { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card img { width: 60px; height: 60px; object-fit: contain; background: #fff; border-radius: 6px; padding: 4px; margin-bottom: 8px; }
        .card div { font-size: 12px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: bold; }

        /* Modal Styles - Rewritten for 100% compatibility */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        .modal-content { 
            background: var(--card); 
            width: 100%; 
            max-width: 500px; 
            padding: 25px; 
            border-radius: 12px; 
            position: relative; 
            border: 1px solid #444; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            max-height: 90vh; 
            overflow-y: auto; 
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #888; transition: 0.2s; line-height: 1; }
        .close-btn:hover { color: #fff; }
        .modal-logo { width: 80px; height: 80px; object-fit: contain; background: #fff; border-radius: 8px; padding: 5px; display: block; margin: 0 auto 15px; }
        .modal-title { text-align: center; margin-bottom: 20px; color: var(--text); font-size: 20px; }
        .info-box { background: #111; padding: 10px 12px; border-radius: 6px; margin-bottom: 10px; font-size: 12px; word-break: break-all; border: 1px solid #333; }
        .info-box strong { color: var(--accent); display: block; margin-bottom: 3px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .play-btn-lg { width: 100%; padding: 12px; font-size: 16px; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="nav">
        <img src="https://raw.githubusercontent.com/VGLiveTV/vgtv/refs/heads/main/logo.png" alt="VG TV Logo" class="nav-logo">
        <input type="text" id="search" placeholder="Search Channel...">
    </div>

    <div id="grid" class="grid">
        <div style="grid-column:1/-1; text-align:center; color:#555; margin-top:50px;">
            Loading Channels...
        </div>
    </div>

    <div id="detailsModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeModal()">&times;</span>
            <img id="m-logo" class="modal-logo" src="" alt="logo">
            <h2 id="m-name" class="modal-title"></h2>
            
            <div class="info-box">
                <strong>Stream URL</strong>
                <span id="m-url"></span>
            </div>
            <div class="info-box">
                <strong>Key ID</strong>
                <span id="m-kid"></span>
            </div>
            <div class="info-box">
                <strong>Key</strong>
                <span id="m-key"></span>
            </div>
            <div class="info-box">
                <strong>Cookie</strong>
                <span id="m-cookie"></span>
            </div>

            <button id="m-play" class="btn play-btn-lg">▶ PLAY NOW</button>
        </div>
    </div>

    <script>
        const API_URL = "https://raw.githubusercontent.com/vaathala00/jow/main/output.json";
        let activeDb = []; 
        let displayedChannels = []; 
        let currentChannelData = null;

        // 1. Fetch API data
        async function fetchServerData() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#999; margin-top:50px;">Loading Channels...</div>';
            
            try {
                const res = await fetch(API_URL);
                if (res.ok) {
                    const rawData = await res.json();
                    
                    // Smart parser in case the JSON is wrapped in an object
                    let dataArray = Array.isArray(rawData) ? rawData : (rawData.channels || rawData.data || rawData.result || []);

                    activeDb = dataArray.map(c => ({
                        channel_name: c.name || "Unknown",
                        channel_logo: c.logo || "",
                        channel_url: c.url || c.stream_url || "",
                        keyId: c.keyId || c.key_id || "",
                        key: c.key || "",
                        cookie: c.cookie || ""
                    }));

                    activeDb.sort((a, b) => (a.channel_name || "").localeCompare(b.channel_name || ""));
                    applyFilters();
                } else {
                    throw new Error("Server response not OK");
                }
            } catch (err) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#ef4444; margin-top:50px;">Failed to Load Channels.<br>Check Internet Connection.</div>`;
                console.error(err);
            }
        }

        // 2. Filter Logic
        const searchInput = document.getElementById('search');

        function applyFilters() {
            const t = searchInput.value.toLowerCase();

            const filtered = activeDb.filter(c => {
                const name = (c.channel_name || "").toLowerCase();
                return name.includes(t);
            });

            render(filtered);
        }

        searchInput.oninput = applyFilters;

        // 3. Render Grid 
        function render(data) {
            displayedChannels = data; // Save the currently filtered list
            const g = document.getElementById('grid');
            if(data.length === 0) {
                g.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#555;">No Channels Found</div>';
                return;
            }
            // Passing the index to the function securely
            g.innerHTML = data.map((c, index) => {
                return `
                <div class="card" onclick="window.openModal(${index})">
                    <img src="${c.channel_logo}" onerror="this.src='https://via.placeholder.com/60?text=TV'">
                    <div>${c.channel_name}</div>
                </div>
            `}).join('');
        }

        // 4. Modal Logic (Attached globally to prevent missing references)
        window.openModal = function(index) {
            const c = displayedChannels[index];
            if (!c) return;

            currentChannelData = c;
            
            document.getElementById('m-logo').src = c.channel_logo || 'https://via.placeholder.com/60?text=TV';
            document.getElementById('m-name').textContent = c.channel_name || 'Unknown Channel';
            document.getElementById('m-url').textContent = c.channel_url || 'N/A';
            document.getElementById('m-kid').textContent = (c.keyId && c.keyId !== "Null") ? c.keyId : 'N/A';
            document.getElementById('m-key').textContent = (c.key && c.key !== "Null") ? c.key : 'N/A';
            
            // Safely handle object cookies if they exist in JSON
            let cookieText = c.cookie;
            if (typeof cookieText === 'object') cookieText = JSON.stringify(cookieText);
            document.getElementById('m-cookie').textContent = cookieText ? cookieText : 'N/A';
            
            document.getElementById('detailsModal').style.display = 'flex';
        };

        window.closeModal = function() {
            document.getElementById('detailsModal').style.display = 'none';
            currentChannelData = null;
        };

        // Close modal when clicking outside the box
        window.onclick = function(event) {
            const modal = document.getElementById('detailsModal');
            if (event.target === modal) {
                window.closeModal();
            }
        };

        // Trigger play from modal
        document.getElementById('m-play').onclick = () => {
            if (currentChannelData) {
                playInNewTab(currentChannelData);
            }
        };

        // 5. Generate & Open Player
        function playInNewTab(c) {
            const name = c.channel_name || "VG Player";
            const url = c.channel_url || "";
            const kid = (c.keyId && c.keyId !== "Null") ? c.keyId : "";
            const key = (c.key && c.key !== "Null") ? c.key : "";
            const cookie = c.cookie || "";

            const safeKid = JSON.stringify(kid);
            const safeKey = JSON.stringify(key);
            const safeCookie = JSON.stringify(cookie);
            const safeUrl = JSON.stringify(url);

            const playerCode = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${name}</title>
  <link rel="icon" href="https://raw.githubusercontent.com/VGLiveTV/vgtv/refs/heads/main/fav.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"><\/script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }
    .shaka-spinner-container { display: none !important; }
  </style>
</head>
<body>
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay playsinline preload="metadata" id="video"></video>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            alert('Browser not supported');
            return;
        }

        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, document.querySelector('.shaka-video-container'), video);

        ui.configure({
            controlPanelElements: ['play_pause','time_and_duration','mute','volume','spacer','language','captions','picture_in_picture','quality','fullscreen'],
            seekBarColors: { base: 'white', buffered: 'red', played: 'white' }
        });

        const kid = ${safeKid};
        const key = ${safeKey};
        let cookieHeader = ${safeCookie};
        let streamUrl = ${safeUrl};

        let drmConfig = { clearKeys: {} };
        if(kid && key) {
            drmConfig.clearKeys[kid] = key;
        }

        player.configure({ drm: drmConfig });

        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers['Referer'] = 'https://www.jiotv.com/';
            request.headers['User-Agent'] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
            if(cookieHeader) request.headers['Cookie'] = cookieHeader;

            // Automatically injects cookie into manifest/segment requests if needed
            if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && request.uris[0] && !request.uris[0].includes('__hdnea=')) {
                const sep = request.uris[0].includes('?') ? '&' : '?';
                request.uris[0] += sep + cookieHeader;
            }
        });

        try {
            await player.load(streamUrl);
            video.play();
        } catch (e) { console.error('Error loading stream:', e); }
    });
  <\/script>
</body>
</html>`;

            const blob = new Blob([playerCode], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
        }

        // Initialize App
        fetchServerData();
    </script>
</body>
</html>
