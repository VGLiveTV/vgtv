<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VG Live TV</title>
  
  <link rel="icon" href="https://raw.githubusercontent.com/VGLiveTV/vgtv/refs/heads/main/fav.png">

  <style>
    /* Theme Variables based on Logo styling */
    :root {
        --brand: #e50914; /* Main logo color accent */
        --brand-glow: rgba(229, 9, 20, 0.4);
        --bg: #0a0f1a;
        --card-bg: #111827;
        --card-border: #1f2937;
        --text-main: #f3f4f6;
        --text-sub: #9ca3af;
    }

    /* Base styles */
    html, body { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        height: 100%; 
        background: var(--bg); 
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* --- PLAYER VIEW (Full Screen) --- */
    #playerView {
        display: none; 
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
    }
    #videoFrame {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* --- GRID VIEW --- */
    #gridView {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 20px;
        box-sizing: border-box;
        width: 100%; /* Ensures full width on desktop */
        margin: 0 auto;
    }

    /* Top Bar (Logo + Search Inline) */
    .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 15px;
        margin-bottom: 25px;
        width: 100%;
    }

    .main-logo {
        height: 40px; 
        width: auto;
        object-fit: contain;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
    }

    .search-container {
        flex: 1;
        display: flex;
        justify-content: flex-end; 
    }

    #searchInput {
        padding: 12px 20px;
        width: 100%;
        max-width: 400px; 
        border-radius: 30px;
        border: 1px solid var(--card-border);
        background: var(--card-bg);
        color: var(--text-main);
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    #searchInput:focus {
        border-color: var(--brand);
        box-shadow: 0 0 12px var(--brand-glow);
    }

    #searchInput::placeholder {
        color: var(--text-sub);
    }

    /* Grid Layout */
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 15px;
        overflow-y: auto;
        flex: 1;
        padding-bottom: 20px;
        padding-right: 5px;
    }
    
    /* Custom Scrollbar */
    .grid-container::-webkit-scrollbar { width: 8px; }
    .grid-container::-webkit-scrollbar-track { background: var(--bg); }
    .grid-container::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }
    .grid-container::-webkit-scrollbar-thumb:hover { background: var(--brand); }

    .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 15px 10px;
        text-align: center;
        cursor: pointer;
        transition: all 0.25s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .card:hover {
        transform: translateY(-5px);
        border-color: var(--brand);
        box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px var(--brand-glow);
    }
    .card img {
        width: 60px;
        height: 60px;
        object-fit: contain;
        margin-bottom: 10px;
        background: #fff;
        border-radius: 10px;
        padding: 4px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .card .name {
        font-size: 13px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        width: 100%;
        color: var(--text-main);
    }
    .card .id-badge {
        font-size: 10px;
        color: var(--brand);
        margin-top: 5px;
        font-weight: 700;
        letter-spacing: 0.5px;
        background: rgba(229, 9, 20, 0.1);
        padding: 3px 8px;
        border-radius: 12px;
    }
    
    /* Loading text */
    #loading {
        text-align: center;
        color: var(--text-sub);
        margin-top: 50px;
        font-size: 16px;
        font-weight: 500;
    }

    /* Mobile Responsive Adjustments */
    @media (max-width: 600px) {
        #gridView {
            padding: 15px;
        }
        .top-bar {
            gap: 10px;
            margin-bottom: 15px;
        }
        .main-logo {
            height: 28px; 
        }
        #searchInput {
            padding: 10px 16px;
            font-size: 14px;
        }
        .grid-container {
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 12px;
        }
    }
  </style>
</head>
<body>

  <div id="playerView">
      <iframe 
        id="videoFrame" 
        src="" 
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture" 
        sandbox="allow-scripts allow-same-origin allow-forms"
        allowfullscreen 
        referrerpolicy="no-referrer">
      </iframe>
  </div>

  <div id="gridView">
      
      <div class="top-bar">
          <img src="https://raw.githubusercontent.com/VGLiveTV/vgtv/refs/heads/main/logo.png" alt="VG TV Logo" class="main-logo">
          <div class="search-container">
              <input type="text" id="searchInput" placeholder="Search channels...">
          </div>
      </div>
      
      <div id="loading">Fetching Channels...</div>
      <div id="gridContainer" class="grid-container"></div>
  </div>

  <script>
    const API_URL = "https://raw.githubusercontent.com/vaathala00/jow/main/output.json";
    let allChannels = [];

    const playerView = document.getElementById("playerView");
    const gridView = document.getElementById("gridView");
    const iframe = document.getElementById("videoFrame");
    const gridContainer = document.getElementById("gridContainer");
    const searchInput = document.getElementById("searchInput");
    const loading = document.getElementById("loading");

    // Check if URL has ?id=
    function getIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    async function init() {
      const id = getIdFromUrl();
      
      try {
        const response = await fetch(API_URL);
        allChannels = await response.json();

        if (id) {
          // --- MODE 1: PLAY CHANNEL (Triggered in New Tab) ---
          gridView.style.display = "none";
          playerView.style.display = "block";
          
          const channel = allChannels.find(c => c.id === id);
          if (channel) {
            iframe.src = channel.link; 
            document.title = channel.name; 
          } else {
            alert("Channel not found!");
          }
        } else {
          // --- MODE 2: SHOW GRID (Default Homepage) ---
          playerView.style.display = "none";
          gridView.style.display = "flex";
          loading.style.display = "none";
          
          // Sort alphabetically by default for a better UI experience
          allChannels.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
          renderGrid(allChannels);
        }
      } catch (err) {
        console.error("Failed to load channels:", err);
        if(!id) {
            loading.innerText = "Failed to load channels. Please check your internet connection.";
            loading.style.color = "var(--brand)";
        }
      }
    }

    // Render the grid elements
    function renderGrid(channels) {
        gridContainer.innerHTML = "";
        if (channels.length === 0) {
            gridContainer.innerHTML = "<div style='grid-column: 1/-1; text-align: center; color: var(--text-sub); padding-top: 40px;'>No channels found matching your search.</div>";
            return;
        }

        channels.forEach(c => {
            const safeName = c.name ? c.name.replace(/'/g, "&apos;") : "Unknown";
            const safeLogo = c.logo || "https://via.placeholder.com/100?text=VG+TV";
            const safeId = c.id || "";

            // Create card element
            const card = document.createElement('div');
            card.className = 'card';
            
            // On click, open the same page in a NEW TAB with the channel's ID
            card.onclick = () => window.open("?id=" + safeId, "_blank");

            card.innerHTML = `
                <img src="${safeLogo}" onerror="this.src='https://via.placeholder.com/100?text=TV'">
                <div class="name">${safeName}</div>
                <div class="id-badge">ID: ${safeId}</div>
            `;
            gridContainer.appendChild(card);
        });
    }

    // Search Box Logic
    searchInput.addEventListener("input", (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allChannels.filter(c => 
            (c.name && c.name.toLowerCase().includes(term)) || 
            (c.id && c.id.toString().toLowerCase().includes(term))
        );
        renderGrid(filtered);
    });

    // Auto-rotate to Landscape on Mobile when Fullscreen is activated
    function handleFullscreenChange() {
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
        
        if (isFullscreen) {
            if (screen.orientation && screen.orientation.lock) {
                // Ignore errors silently for devices that don't support orientation lock (like iOS)
                screen.orientation.lock('landscape').catch(() => {});
            }
        } else {
            if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
        }
    }

    // Listen to standard and vendor-prefixed fullscreen events
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    document.addEventListener('mozfullscreenchange', handleFullscreenChange);
    document.addEventListener('MSFullscreenChange', handleFullscreenChange);

    // Start App
    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
