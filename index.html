<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sports Test</title>
<meta name="referrer" content="no-referrer">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.shaka-video-container{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

.custom-watermark{
    position:absolute;
    z-index:40;
    pointer-events:none;
    top:65%;
    left:6%;
    transform:translateY(-50%);
    font-size:11px;
    font-weight:600;
    color:rgba(255,255,255,0.12);
}

@media(max-width:700px){
    .custom-watermark{font-size:9px;top:60%;left:16%}
}

/* --- ADDED: Input Panel Styles --- */
#input-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 9999;
    background: rgba(15, 23, 42, 0.85);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #334155;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 320px;
    backdrop-filter: blur(5px);
    transition: 0.3s;
}

#input-panel input {
    padding: 8px;
    background: #000;
    border: 1px solid #444;
    color: #fff;
    border-radius: 4px;
    font-family: monospace;
    font-size: 12px;
    outline: none;
}
#input-panel input:focus { border-color: #e50914; }

#play-btn {
    padding: 10px;
    background: #e50914;
    color: white;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
}
#play-btn:hover { background: #ff0a16; }

#toggle-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10000;
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    display: none;
}
</style>
</head>
<body>

<button id="toggle-panel" onclick="togglePanel()">Show Panel</button>
<div id="input-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
        <span style="color: white; font-weight: bold; font-size: 14px;">Manual Channel Load</span>
        <span style="color: #888; cursor: pointer; font-size: 18px; line-height: 1;" onclick="togglePanel()">×</span>
    </div>
    <input type="text" id="input-url" placeholder="Stream URL (.mpd)" value="https://jiotvmblive.cdn.jio.com/bpk-tv/DD_Sports_BTS/output/index.mpd">
    <input type="text" id="input-kid" placeholder="Key ID" value="0c1b139b9a955134a1efae8e44b63aac">
    <input type="text" id="input-key" placeholder="Key" value="00897bffd6997049787270797b8c3a17">
    <button id="play-btn">Play Stream</button>
</div>

<div class="shaka-video-container" id="player-container">
    <video id="video" autoplay muted playsinline preload="metadata"></video>
    <div class="custom-watermark"> </div>
</div>

<script>
// ADDED: Simple toggle for the input panel
function togglePanel() {
    const panel = document.getElementById('input-panel');
    const toggleBtn = document.getElementById('toggle-panel');
    if (panel.style.display === 'none') {
        panel.style.display = 'flex';
        toggleBtn.style.display = 'none';
    } else {
        panel.style.display = 'none';
        toggleBtn.style.display = 'block';
    }
}

(function(){
  document.addEventListener("DOMContentLoaded",async()=>{

    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;

    const video=document.getElementById("video");
    const container=document.getElementById("player-container");

    video.muted=true;

    const player=new shaka.Player();
    await player.attach(video);

    const ui=new shaka.ui.Overlay(player,container,video);

    ui.configure({
        addBigPlayButton: true,
        controlPanelElements: [
            "mute",            
            "play_pause",      
            "time_and_duration", 
            "spacer",
            "quality",
            "picture_in_picture",
            "fullscreen"
        ],
        seekBarColors: {
            base: "white",
            buffered: "red", 
            played: "green"
        }
    });

    // Initial streaming config (DRM keys will be injected dynamically below)
    player.configure({
      manifest:{defaultPresentationDelay:5},
      streaming:{
        lowLatencyMode:true,
        bufferingGoal:10,
        rebufferingGoal:2,
        safeSeekOffset:5
      }
    });

    let cookieValue="";

    try{
      const response=await fetch("https://allrounderid2.pages.dev/api/cookie.json",{cache:"no-store"});
      const data=await response.json();
      cookieValue=data.cookie||"";
    }catch(e){}

    if(cookieValue){
      player.getNetworkingEngine().registerRequestFilter((type,request)=>{
        request.headers["Referer"]="https://www.jiotv.com/";
        request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        request.headers["Cookie"]=cookieValue;

        let urlCookie=cookieValue.startsWith("__hdnea__=")?cookieValue.substring(10):cookieValue;

        if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST||
        type===shaka.net.NetworkingEngine.RequestType.SEGMENT)&&
        !request.uris[0].includes("__hdnea__")){
          const sep=request.uris[0].includes("?")?"&":"?";
          request.uris[0]+=sep+"__hdnea__="+urlCookie;
        }
      });
    }

    // --- MODIFIED: Load Stream Function tied to Inputs ---
    async function loadCustomStream() {
        const streamUrl = document.getElementById("input-url").value;
        const keyId = document.getElementById("input-kid").value;
        const key = document.getElementById("input-key").value;

        // Apply DRM if keys exist
        if(keyId && key) {
            player.configure({ drm: { clearKeys: { [keyId]: key } } });
        } else {
            player.configure({ drm: { clearKeys: {} } }); // Clear keys if blank
        }

        try{
          await player.load(streamUrl);
          video.play().catch(()=>{});
        }catch(e){
          console.error("Stream Load Error:", e);
        }
    }

    // Attach button click event
    document.getElementById("play-btn").addEventListener("click", loadCustomStream);

    // Load the default DD Sports stream on initial boot
    loadCustomStream();

    video.addEventListener("play",()=>{
      video.muted=false;
    });

  });
})();
</script>
</body>  
</html>
