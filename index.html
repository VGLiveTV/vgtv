<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live TV</title>
  <style>
    /* Base styles */
    html, body { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        height: 100%; 
        background: #0a0a0a; 
        color: #fff;
        font-family: sans-serif;
    }

    /* --- PLAYER VIEW (Full Screen) --- */
    #playerView {
        display: none; /* Hidden by default */
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    #videoFrame {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* --- GRID VIEW --- */
    #gridView {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 20px;
        box-sizing: border-box;
    }

    /* Search Bar */
    .search-container {
        text-align: center;
        margin-bottom: 20px;
    }
    #searchInput {
        padding: 12px 20px;
        width: 100%;
        max-width: 400px;
        border-radius: 25px;
        border: 1px solid #333;
        background: #111;
        color: #fff;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
    }
    #searchInput:focus {
        border-color: #00ff6a;
        box-shadow: 0 0 8px rgba(0, 255, 106, 0.3);
    }

    /* Grid Layout */
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 15px;
        overflow-y: auto;
        flex: 1;
        padding-bottom: 20px;
    }
    .card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;
        padding: 15px 10px;
        text-align: center;
        cursor: pointer;
        transition: transform 0.2s, border-color 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .card:hover {
        transform: translateY(-5px);
        border-color: #00ff6a;
    }
    .card img {
        width: 60px;
        height: 60px;
        object-fit: contain;
        margin-bottom: 10px;
        background: #fff;
        border-radius: 8px;
        padding: 2px;
    }
    .card .name {
        font-size: 13px;
        font-weight: bold;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        width: 100%;
    }
    .card .id-badge {
        font-size: 10px;
        color: #00ff6a;
        margin-top: 5px;
        font-weight: bold;
    }
    
    /* Loading text */
    #loading {
        text-align: center;
        color: #888;
        margin-top: 50px;
    }
  </style>
</head>
<body>

  <div id="playerView">
      <iframe 
        id="videoFrame" 
        src="" 
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture" 
        sandbox="allow-scripts allow-same-origin allow-forms"
        allowfullscreen 
        referrerpolicy="no-referrer">
      </iframe>
  </div>

  <div id="gridView">
      <div class="search-container">
          <input type="text" id="searchInput" placeholder="Search for a channel...">
      </div>
      <div id="loading">Loading Channels...</div>
      <div id="gridContainer" class="grid-container"></div>
  </div>

  <script>
    const API_URL = "https://raw.githubusercontent.com/vaathala00/jow/main/output.json";
    let allChannels = [];

    const playerView = document.getElementById("playerView");
    const gridView = document.getElementById("gridView");
    const iframe = document.getElementById("videoFrame");
    const gridContainer = document.getElementById("gridContainer");
    const searchInput = document.getElementById("searchInput");
    const loading = document.getElementById("loading");

    // Check if URL has ?id=
    function getIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    async function init() {
      const id = getIdFromUrl();
      
      try {
        const response = await fetch(API_URL);
        allChannels = await response.json();

        if (id) {
          // --- MODE 1: PLAY CHANNEL (Triggered in New Tab) ---
          gridView.style.display = "none";
          playerView.style.display = "block";
          
          const channel = allChannels.find(c => c.id === id);
          if (channel) {
            iframe.src = channel.link; 
            document.title = channel.name + " - Live";
          } else {
            alert("Channel not found!");
          }
        } else {
          // --- MODE 2: SHOW GRID (Default Homepage) ---
          playerView.style.display = "none";
          gridView.style.display = "flex";
          loading.style.display = "none";
          
          renderGrid(allChannels);
        }
      } catch (err) {
        console.error("Failed to load channels:", err);
        if(!id) loading.innerText = "Failed to load channels. Check your connection.";
      }
    }

    // Render the grid elements
    function renderGrid(channels) {
        gridContainer.innerHTML = "";
        if (channels.length === 0) {
            gridContainer.innerHTML = "<div style='grid-column: 1/-1; text-align: center; color: #888;'>No channels found.</div>";
            return;
        }

        channels.forEach(c => {
            const safeName = c.name ? c.name.replace(/'/g, "&apos;") : "Unknown";
            const safeLogo = c.logo || "https://via.placeholder.com/60?text=TV";
            const safeId = c.id || "";

            // Create card element
            const card = document.createElement('div');
            card.className = 'card';
            
            // On click, open the same page in a NEW TAB with the channel's ID
            card.onclick = () => window.open("?id=" + safeId, "_blank");

            card.innerHTML = `
                <img src="${safeLogo}" onerror="this.src='https://via.placeholder.com/60?text=TV'">
                <div class="name">${safeName}</div>
                <div class="id-badge">ID: ${safeId}</div>
            `;
            gridContainer.appendChild(card);
        });
    }

    // Search Box Logic
    searchInput.addEventListener("input", (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allChannels.filter(c => 
            (c.name && c.name.toLowerCase().includes(term)) || 
            (c.id && c.id.toString().toLowerCase().includes(term))
        );
        renderGrid(filtered);
    });

    // Start App
    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
