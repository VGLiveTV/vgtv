<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Star Sports 1 Hindi HD</title>
  <meta name="referrer" content="no-referrer">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif}

    .shaka-video-container{
      position:fixed;
      inset:0;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }

    .custom-watermark{
      position:absolute;
      z-index:40;
      pointer-events:none;
      top:65%;
      left:6%;
      transform: translateY(-50%);
      font-size:11px;
      font-weight:600;
      color: rgba(255, 255, 255, 0.12);
    }

    @media(max-width:700px){
      .custom-watermark{ font-size:9px; top:60%; left:16%; }
    }
  </style>
</head>
<body>

  <div class="shaka-video-container" id="player-container">
    <video id="video" autoplay playsinline preload="metadata"></video>
    <div class="custom-watermark"> </div>
  </div>

  <script>
    const CONFIG = {
      streamUrl: "https://jiotvmblive.cdn.jio.com//bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
      keyId: "400131994b445d8c8817202248760fda",
      key: "2d56cb6f07a75b9aff165d534ae2bfc4",

      manualCookie: "__hdnea__=st=1774089189~exp=1774175589~acl=/*~hmac=b411fb6b11773061f720a9eb9dcbd244372a643dbe0113ca9f93042481c8202c",
    };

    document.addEventListener('DOMContentLoaded', async () => {

      shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) return;

      const videoEl = document.getElementById('video');
      const container = document.getElementById('player-container');

      const player = new shaka.Player();
      await player.attach(videoEl);

      const ui = new shaka.ui.Overlay(player, container, videoEl);

      ui.configure({
        controlPanelElements: ['play_pause','time_and_duration','mute','volume','spacer','language','captions','picture_in_picture','quality','fullscreen'],
        seekBarColors: { base: 'white', buffered: 'red', played: 'green' }
      });

      player.configure({
        drm: { clearKeys: { [CONFIG.keyId]: CONFIG.key } },
        manifest: { defaultPresentationDelay: 5 },
        streaming: { safeSeekOffset: 5, bufferingGoal: 10, rebufferingGoal: 2, lowLatencyMode: true }
      });

      player.getNetworkingEngine().registerRequestFilter((type, request) => {

        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';

        if (CONFIG.manualCookie && CONFIG.manualCookie !== "PUT_YOUR_COOKIE_HERE") {

          request.headers['Cookie'] = CONFIG.manualCookie;

          if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
               type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
               !request.uris[0].includes('__hdnea__')) {

            const sep = request.uris[0].includes('?') ? '&' : '?';
            request.uris[0] += sep + CONFIG.manualCookie;
          }
        }
      });

      try {
        await player.load(CONFIG.streamUrl);
        videoEl.play();
      } catch (e) {
        console.error("Stream Load Error:", e);
      }
    });
  </script>

</body>
</html>
